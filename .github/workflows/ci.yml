name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.14"

jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest

    services:
      dynamodb-local:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000

    env:
      DYNAMODB_LOCAL_ENDPOINT: http://localhost:8000
      AWS_ACCESS_KEY_ID: testing
      AWS_SECRET_ACCESS_KEY: testing
      AWS_DEFAULT_REGION: us-west-2

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,cdk]"

      - name: Wait for DynamoDB Local
        run: |
          for i in $(seq 1 30); do
            if curl -s --connect-timeout 2 -o /dev/null http://localhost:8000 2>&1; then
              echo "DynamoDB Local is ready"
              break
            fi
            echo "Waiting for DynamoDB Local... ($i/30)"
            sleep 1
          done
          curl -s --connect-timeout 2 -o /dev/null http://localhost:8000 2>&1 || { echo "DynamoDB Local failed to start"; exit 1; }

      - name: Run quality gate
        run: ./scripts/check-backend.sh

  qgis-plugin-tests:
    name: QGIS Plugin Tests
    runs-on: ubuntu-latest
    needs: quality-gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    env:
      OAPIF_ENVIRONMENT: dev
      AWS_DEFAULT_REGION: us-west-2

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-west-2

      - name: Set up acceptance test fixtures
        run: ./scripts/acceptance-setup.sh

      - name: Start QGIS test container
        run: ./scripts/qgis-test-setup.sh

      - name: Run QGIS plugin tests
        run: ./scripts/qgis-test.sh

      - name: Tear down QGIS container
        if: always()
        run: ./scripts/qgis-test-teardown.sh

      - name: Tear down acceptance fixtures
        if: always()
        run: ./scripts/acceptance-teardown.sh
