# Plugin test configuration — runs inside the QGIS Docker container.
# This file is read by pytest when invoked from /plugin/tests/.

[pytest]
testpaths = tests
markers =
    qgis_unit: Unit tests — pure Python, no QGIS dependency
    qgis_headless: Headless PyQGIS tests — QgsApplication([], False), offscreen
    qgis_widget: GUI widget tests — QgsApplication([], True), Xvfb + QTest
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
