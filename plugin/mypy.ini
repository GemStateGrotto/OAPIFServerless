# Mypy configuration for the QGIS plugin.
#
# Targets Python 3.12 (QGIS-bundled) instead of the backend's 3.14.
# Ignores QGIS/Qt imports that aren't available in the DevContainer.

[mypy]
python_version = 3.12
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

[mypy-qgis.*]
ignore_missing_imports = true

[mypy-PyQt5.*]
ignore_missing_imports = true

[mypy-PyQt6.*]
ignore_missing_imports = true

[mypy-keyring.*]
ignore_missing_imports = true
